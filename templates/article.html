<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}}</title>
    <link rel="stylesheet" href="/assets/github-markdown.css">
    <link rel="stylesheet" href="/assets/style.css" media="screen and (min-width: 769px)">
    <link rel="stylesheet" href="/assets/style-mobile.css" media="screen and (max-width: 768px)">
    <link rel="icon" href="/assets/avatar.jpg" type="image/jpeg">
    <link rel="apple-touch-icon" href="/assets/avatar.jpg">
    <script>
    // 动态加载样式 - 根据屏幕宽度切换
    (function() {
        function loadCSS() {
            const isMobile = window.innerWidth <= 768;
            const desktopCSS = document.querySelector('link[href="/assets/style.css"]');
            const mobileCSS = document.querySelector('link[href="/assets/style-mobile.css"]');
            if (isMobile) {
                desktopCSS.media = 'none';
                mobileCSS.media = 'all';
            } else {
                desktopCSS.media = 'all';
                mobileCSS.media = 'none';
            }
        }
        loadCSS();
        window.addEventListener('resize', loadCSS);
    })();
    </script>
</head>
<body>
    <!-- 页面转场过渡 -->
    <div id="page-transition" class="page-transition"></div>
    <div class="page-wrapper">
        <header class="site-header">
            <div class="container">
                <nav>
                    <ul class="nav-links">
                        <li><a href="/index.html">首页</a></li>
                        <li><a href="/search.html">搜索</a></li>
                    </ul>
                </nav>
            </div>
        </header>

        <div class="article-layout">
            <aside class="article-sidebar">
                {{TOC}}
            </aside>
            <main class="article-main">
                {{CONTENT}}
            </main>
        </div>

        <footer class="site-footer">
            <div class="container">
                <p>使用静态博客生成器构建 &copy; 2026</p>
            </div>
        </footer>
    </div>

    <script>
    // Share Buttons - Dynamic URL generation
    (function () {
        const currentUrl = window.location.href;
        const currentTitle = document.title.replace(/ - 西南$/, '');
        
        // Copy link button
        const copyLinkBtn = document.querySelector('.copy-link-btn');
        if (copyLinkBtn) {
            copyLinkBtn.addEventListener('click', async function () {
                try {
                    await navigator.clipboard.writeText(currentUrl);
                    const originalHTML = this.innerHTML;
                    this.innerHTML = '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg><span>已复制!</span>';
                    this.classList.add('copied');
                    
                    setTimeout(() => {
                        this.innerHTML = originalHTML;
                        this.classList.remove('copied');
                    }, 2000);
                } catch (err) {
                    console.error('复制失败:', err);
                }
            });
        }
        
        // Twitter/X share
        const twitterBtn = document.querySelector('.twitter-btn');
        if (twitterBtn) {
            twitterBtn.href = `https://twitter.com/intent/tweet?url=${encodeURIComponent(currentUrl)}&text=${encodeURIComponent(currentTitle)}`;
        }
        
        // Telegram share
        const telegramBtn = document.querySelector('.telegram-btn');
        if (telegramBtn) {
            telegramBtn.href = `https://t.me/share/url?url=${encodeURIComponent(currentUrl)}&text=${encodeURIComponent(currentTitle)}`;
        }
        
        // Email share
        const emailBtn = document.querySelector('.email-btn');
        if (emailBtn) {
            emailBtn.href = `mailto:?subject=${encodeURIComponent(currentTitle)}&body=${encodeURIComponent(currentUrl)}`;
        }
    })();

    // Code Block Copy Button (GitHub style)
    (function () {
        const codeBlocks = document.querySelectorAll('.post-content pre');
        
        // SVG Icons
        const copyIcon = '<svg viewBox="0 0 16 16" width="16" height="16"><path d="M0 6.75C0 5.784.784 5 1.75 5h1.5a.75.75 0 0 1 0 1.5h-1.5a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-1.5a.75.75 0 0 1 1.5 0v1.5A1.75 1.75 0 0 1 9.25 16h-7.5A1.75 1.75 0 0 1 0 14.25Z"/><path d="M5 1.75C5 .784 5.784 0 6.75 0h7.5C15.216 0 16 .784 16 1.75v7.5A1.75 1.75 0 0 1 14.25 11h-7.5A1.75 1.75 0 0 1 5 9.25Zm1.75-.25a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-7.5a.25.25 0 0 0-.25-.25Z"/></svg>';
        const checkIcon = '<svg viewBox="0 0 16 16" width="16" height="16"><path d="M13.78 4.22a.75.75 0 0 1 0 1.06l-7.25 7.25a.75.75 0 0 1-1.06 0L2.22 9.28a.75.75 0 0 1 1.06-1.06L6 10.94l6.72-6.72a.75.75 0 0 1 1.06 0Z"/></svg>';
        
        codeBlocks.forEach(block => {
            // Skip if already has a copy button
            if (block.querySelector('.code-copy-btn')) return;
            
            // Skip if no code element (empty blocks)
            const codeEl = block.querySelector('code');
            if (!codeEl) return;

            // Create button container
            const btnContainer = document.createElement('div');
            btnContainer.className = 'code-header';
            
            // Create copy button
            const btn = document.createElement('button');
            btn.className = 'code-copy-btn';
            btn.innerHTML = copyIcon;
            btn.setAttribute('aria-label', '复制代码');
            btnContainer.appendChild(btn);
            
            // Insert button at the beginning of pre
            block.insertBefore(btnContainer, block.firstChild);

            // Copy function
            const doCopy = async () => {
                const text = codeEl.textContent;
                try {
                    await navigator.clipboard.writeText(text);
                    
                    // Show "Copied!" feedback
                    btn.innerHTML = checkIcon + '<span class="copied-text">Copied!</span>';
                    btn.classList.add('copied');
                    
                    // Reset after 2 seconds
                    setTimeout(() => {
                        btn.innerHTML = copyIcon;
                        btn.classList.remove('copied');
                    }, 2000);
                } catch (err) {
                    // Fallback for older browsers
                    const textarea = document.createElement('textarea');
                    textarea.value = text;
                    textarea.style.position = 'fixed';
                    textarea.style.opacity = '0';
                    block.appendChild(textarea);
                    textarea.select();
                    try {
                        document.execCommand('copy');
                        btn.innerHTML = checkIcon + '<span class="copied-text">Copied!</span>';
                        btn.classList.add('copied');
                        setTimeout(() => {
                            btn.innerHTML = copyIcon;
                            btn.classList.remove('copied');
                        }, 2000);
                    } catch (e) {
                        console.error('Copy failed:', e);
                    }
                    block.removeChild(textarea);
                }
            };

            // Click handler
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                e.preventDefault();
                doCopy();
            });
        });
    })();

    // Scroll-spy: highlight active TOC item with auto-scroll
    (function () {
        const tocNav = document.querySelector('.toc-nav');
        if (!tocNav) return;

        const tocLinks = tocNav.querySelectorAll('a');
        const sections = [];

        tocLinks.forEach(link => {
            const id = link.getAttribute('href').slice(1);
            const el = document.getElementById(id);
            if (el) {
                sections.push({ el, link, anchor: link.parentElement });
            }
        });

        if (sections.length === 0) return;

        // Set initial active
        sections[0].anchor.classList.add('active');

        // Auto-scroll TOC to keep active item visible
        function scrollToActiveItem(anchor) {
            const tocRect = tocNav.getBoundingClientRect();
            const anchorRect = anchor.getBoundingClientRect();
            
            // Check if item is outside visible area
            if (anchorRect.top < tocRect.top || anchorRect.bottom > tocRect.bottom) {
                // Center the active item in the TOC
                const scrollTop = tocNav.scrollTop;
                const itemOffset = anchor.offsetTop - (tocNav.clientHeight / 2) + (anchor.clientHeight / 2);
                tocNav.scrollTo({
                    top: Math.max(0, itemOffset),
                    behavior: 'smooth'
                });
            }
        }

        // Use IntersectionObserver for tracking
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const idx = sections.findIndex(s => s.el === entry.target);
                    if (idx !== -1) {
                        sections.forEach(s => s.anchor.classList.remove('active'));
                        sections[idx].anchor.classList.add('active');
                        scrollToActiveItem(sections[idx].anchor);
                    }
                }
            });
        }, {
            rootMargin: '-10% 0px -50% 0px',
            threshold: 0
        });

        sections.forEach(s => observer.observe(s.el));

        // Robust Fallback: Force active state for the last item
        window.addEventListener('scroll', () => {
            const last = sections[sections.length - 1];
            if (!last) return;

            const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            const scrollHeight = Math.max(document.body.scrollHeight, document.documentElement.scrollHeight);
            const windowHeight = window.innerHeight;

            // If scrolled to within 300px of the absolute bottom
            if (scrollTop + windowHeight >= scrollHeight - 300) {
                if (!last.anchor.classList.contains('active')) {
                    sections.forEach(s => s.anchor.classList.remove('active'));
                    last.anchor.classList.add('active');
                    scrollToActiveItem(last.anchor);
                }
            }
        }, { passive: true });

        // Smooth scroll on TOC click
        tocLinks.forEach(link => {
            link.addEventListener('click', function (e) {
                e.preventDefault();
                const id = this.getAttribute('href').slice(1);
                const target = document.getElementById(id);
                if (target) {
                    const headerOffset = 80;
                    const elementPosition = target.getBoundingClientRect().top;
                    const offsetPosition = elementPosition + window.pageYOffset - headerOffset;
                    
                    window.scrollTo({
                        top: offsetPosition,
                        behavior: 'smooth'
                    });
                }
            });
        });
    })();
    </script>

    <script>
    // Reading Position Saver
    (function () {
        const articlePath = window.location.pathname;
        const storageKey = 'reading-position-' + articlePath;
        const throttleDelay = 500; // 保存频率限制
        let lastSaveTime = 0;

        // 恢复阅读位置
        const restorePosition = () => {
            const savedPosition = localStorage.getItem(storageKey);
            if (savedPosition) {
                const position = parseInt(savedPosition, 10);
                if (position > 0) {
                    // 延迟滚动，确保页面完全渲染
                    setTimeout(() => {
                        window.scrollTo(0, position);
                    }, 100);
                }
            }
        };

        // 保存阅读位置
        const savePosition = () => {
            const now = Date.now();
            // 节流：避免频繁写入
            if (now - lastSaveTime < throttleDelay) return;
            
            const position = window.pageYOffset || document.documentElement.scrollTop;
            if (position > 0) {
                localStorage.setItem(storageKey, position.toString());
                lastSaveTime = now;
            }
        };

        // 页面加载时恢复位置
        restorePosition();

        // 滚动时保存位置
        window.addEventListener('scroll', savePosition, { passive: true });

        // 页面卸载前保存（最后保障）
        window.addEventListener('beforeunload', savePosition);

        // 点击目录链接后也保存（用户手动导航到某章节）
        document.querySelectorAll('.toc-nav a').forEach(link => {
            link.addEventListener('click', () => {
                setTimeout(savePosition, 300);
            });
        });

        // 如果用户滚动到顶部，清除保存的位置
        const clearPositionOnTop = () => {
            const position = window.pageYOffset || document.documentElement.scrollTop;
            if (position < 50) {
                localStorage.removeItem(storageKey);
            }
        };

        window.addEventListener('scroll', clearPositionOnTop, { passive: true });
    })();
    </script>

    <script>
    // 页面转场过渡动画
    (function() {
        var overlay = document.getElementById('page-transition');
        var DURATION = 320;
        var isTransitioning = false;

        function clearTransition() {
            document.body.classList.remove('page-fade-out', 'page-fade-in');
            overlay.classList.remove('page-transition-active');
            isTransitioning = false;
        }

        document.addEventListener('click', function(e) {
            var link = e.target.closest('a');
            if (!link || isTransitioning) return;

            var href = link.getAttribute('href');
            if (!href || href.startsWith('#') || href.startsWith('mailto:') ||
                href.startsWith('javascript:') || link.target === '_blank') return;

            if (href.startsWith('/') || href.indexOf(window.location.hostname) !== -1) {
                e.preventDefault();
                isTransitioning = true;

                document.body.classList.add('page-fade-out');
                overlay.classList.add('page-transition-active');

                setTimeout(function() {
                    window.location.href = href;
                }, DURATION);
            }
        });

        window.addEventListener('pageshow', function(e) {
            clearTransition();
            document.body.classList.add('page-fade-in');
            setTimeout(function() {
                document.body.classList.remove('page-fade-in');
            }, DURATION);
        });
    })();
    </script>
</body>
</html>
