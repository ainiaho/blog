<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}}</title>
    <link rel="stylesheet" href="/assets/github-markdown.css">
    <link rel="stylesheet" href="/assets/style.css" media="screen and (min-width: 769px)">
    <link rel="stylesheet" href="/assets/style-mobile.css" media="screen and (max-width: 768px)">
    <script>
    // 动态加载样式 - 根据屏幕宽度切换
    (function() {
        function loadCSS() {
            const isMobile = window.innerWidth <= 768;
            const desktopCSS = document.querySelector('link[href="/assets/style.css"]');
            const mobileCSS = document.querySelector('link[href="/assets/style-mobile.css"]');
            if (isMobile) {
                desktopCSS.media = 'none';
                mobileCSS.media = 'all';
            } else {
                desktopCSS.media = 'all';
                mobileCSS.media = 'none';
            }
        }
        loadCSS();
        window.addEventListener('resize', loadCSS);
    })();
    </script>
</head>
<body>
    <div class="page-wrapper">
        <header class="site-header">
            <div class="container">
                <nav>
                    <ul class="nav-links">
                        <li><a href="/index.html">首页</a></li>
                        <li><a href="/archive.html">归档</a></li>
                        <li><a href="/search.html">搜索</a></li>
                    </ul>
                </nav>
            </div>
        </header>

        <div class="home-layout">
            <aside class="home-sidebar">
                {{SIDEBAR}}
            </aside>
            <main class="home-main">
                {{CONTENT}}
                {{PAGINATION}}
            </main>
        </div>

        <footer class="site-footer">
            <div class="container">
                <p>使用静态博客生成器构建 &copy; 2026</p>
            </div>
        </footer>
    </div>
</body>
</html>
